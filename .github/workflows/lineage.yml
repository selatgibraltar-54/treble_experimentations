name: Build LineageOS GSI V4 #Mr.elang🦅🎩

on:
  workflow_dispatch:
    inputs:
      lineage_branch:
        description: 'LineageOS Branch'
        required: true
        default: 'lineage-19.1'
        type: choice
        options:
        - lineage-19.1
        - lineage-20.0
        - lineage-21.0
      treble_variant:
        description: 'Treble Variant'
        required: true
        default: 'arm64_bgN'
        type: choice
        options:
        - arm64_bgN
        - arm64_bvN
        - a64_bgN
        - a64_bvN

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360
    
    steps:
    - name: 1. Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '/mnt/work'
        overprovision-lvm: 'true'
        
    - name: 2. Check Out Repo
      uses: actions/checkout@v4
        
    - name: 3. Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        
    - name: 4. Set Git Configs
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git config --global color.ui false
        
    - name: 5. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libdw-dev libelf-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: 6. Initialize Repo & Sync - FIX EXIT 1
      run: |
        set -e
        mkdir -p /mnt/work/lineageos
        cd /mnt/work/lineageos
        echo
