name: Build LineageOS GSI V4 #Mr.elang🦅🎩 lagi mukbang🍜

on:
  workflow_dispatch:
    inputs:
      lineage_branch:
        description: 'LineageOS Branch'
        required: true
        default: 'lineage-19.1'
        type: choice
        options:
        - lineage-19.1
        - lineage-20.0
        - lineage-21.0
      treble_variant:
        description: 'Treble Variant'
        required: true
        default: 'arm64_bgN'
        type: choice
        options:
        - arm64_bgN
        - arm64_bvN
        - a64_bgN
        - a64_bvN

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360
    
    steps:
    - name: 1. Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '/mnt/work'
        overprovision-lvm: 'true'
        
    - name: 2. Check Out Repo
      uses: actions/checkout@v4
        
    - name: 3. Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        
    - name: 4. Set Git Configs
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git config --global color.ui false
        
    - name: 5. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libdw-dev libelf-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: 6. Initialize Repo & Sync - FIX EXIT 1
      run: |
        set -e
        mkdir -p /mnt/work/lineageos
        cd /mnt/work/lineageos
        echo "=== REPO INIT ==="
        repo init -u https://github.com/LineageOS/android.git -b ${{ github.event.inputs.lineage_branch }} --git-lfs --depth=1
        mkdir -p .repo/local_manifests
        
        echo "=== DOWNLOAD MANIFEST V4 ==="
        if curl -L -f -s https://raw.githubusercontent.com/phhusson/treble_experimentations/master/lineage.xml -o .repo/local_manifests/treble.xml; then
          echo "Manifest phhusson OK"
        elif curl -L -f -s https://raw.githubusercontent.com/ponces/treble_build_lineage/master/lineage-19.1.xml -o .repo/local_manifests/treble.xml; then
          echo "Manifest ponces OK"
        else
          echo "Fallback: Create manifest manual"
          cat > .repo/local_manifests/treble.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="phhusson/treble_experimentations" path="device/phh/treble" remote="github" revision="master" />
          <project name="phhusson/vendor_hardware_overlay" path="vendor/hardware_overlay" remote="github" revision="master" />
        </manifest>
        EOF
        fi
        
        if [ ! -s .repo/local_manifests/treble.xml ]; then 
          echo "FATAL: Manifest kosong"; exit 1
        fi
        echo "Manifest size: $(wc -c < .repo/local_manifests/treble.xml) bytes"
        echo "Manifest head:" && head -3 .repo/local_manifests/treble.xml
        
        echo "=== DOWNLOAD PATCHES ==="
        curl -L -f https://raw.githubusercontent.com/selatgibraltar-54/treble_experimentations/master/patches.sh > patches.sh || exit 1
        
        echo "=== REPO SYNC ==="
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune
        
    - name: 7. Apply Patches & Generate
      run: |
        set -e
        cd /mnt/work/lineageos
        bash patches.sh ${{ github.event.inputs.lineage_branch }}
        cd device/phh/treble
        bash generate.sh ${{ github.event.inputs.treble_variant }}
        
    - name: 8. Build GSI
      run: |
        set -e
        cd /mnt/work/lineageos
        source build/envsetup.sh
        lunch lineage_${{ github.event.inputs.treble_variant }}-userdebug
        make systemimage -j$(nproc --all)
        
    - name: 9. Upload GSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-${{ github.event.inputs.lineage_branch }}-${{ github.event.inputs.treble_variant }}-GSI
        path: |
          /mnt/work/lineageos/out/target/product/*/system.img
          /mnt/work/lineageos/out/target/product/*/system.img.xz
        retention-days: 5
