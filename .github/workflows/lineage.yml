name: Build LineageOS GSI V4.8 #Mr.elang🦅🎩

on:
  workflow_dispatch:
    inputs:
      lineage_branch:
        required: true
        default: 'lineage-19.1'
        type: choice
        options:
        - lineage-19.1
        - lineage-20.0
        - lineage-21.0
      treble_variant:
        required: true
        default: 'arm64_bgN'
        type: choice
        options:
        - arm64_bgN
        - arm64_bvN
        - a64_bgN
        - a64_bvN

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360
    
    steps:
    - name: 1. Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '/mnt/work'
        overprovision-lvm: 'true'
        
    - name: 2. Check Out Repo
      uses: actions/checkout@v4
        
    - name: 3. Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        
    - name: 4. Set Git Configs
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git config --global color.ui false
        
    - name: 5. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libdw-dev libelf-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: 6. Initialize Repo & Sync - V4.8 FIX TREBLE
      run: |
        set -e
        mkdir -p /mnt/work/lineageos
        cd /mnt/work/lineageos
        repo init -u https://github.com/LineageOS/android.git -b ${{ github.event.inputs.lineage_branch }} --git-lfs --depth=1 --no-repo-verify
        mkdir -p .repo/local_manifests
        echo '<?xml version="1.0" encoding="UTF-8"?>' > .repo/local_manifests/treble.xml
        echo '<manifest>' >> .repo/local_manifests/treble.xml
        echo '  <remote name="github" fetch="https://github.com" />' >> .repo/local_manifests/treble.xml
        echo '  <project name="phhusson/treble_experimentations" path="device/phh/treble" remote="github" revision="master" clone-depth="1" />' >> .repo/local_manifests/treble.xml
        echo '  <project name="phhusson/vendor_hardware_overlay" path="vendor/hardware_overlay" remote="github" revision="master" clone-depth="1" />' >> .repo/local_manifests/treble.xml
        echo '  <project name="TrebleDroid/vendor_interfaces" path="vendor/interfaces" remote="github" revision="android-12.1" clone-depth="1" />' >> .repo/local_manifests/treble.xml
        echo '  <project name="TrebleDroid/vendor_vndk" path="vendor/vndk" remote="github" revision="master" clone-depth="1" />' >> .repo/local_manifests/treble.xml
        echo '</manifest>' >> .repo/local_manifests/treble.xml
        echo '#!/bin/bash' > patches.sh
        echo 'echo "No patches needed for ${{ github.event.inputs.lineage_branch }}"' >> patches.sh
        chmod +x patches.sh
        for i in 1 2 3; do
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune && break
          sleep 15
        done
        
    - name: 7. Apply Patches & Generate
      run: |
        set -e
        cd /mnt/work/lineageos
        bash patches.sh ${{ github.event.inputs.lineage_branch }}
        if [ ! -d "device/phh/treble" ]; then
          echo "ERROR: device/phh/treble still missing after sync"
          ls -la device/phh/
          exit 1
        fi
        cd device/phh/treble
        bash generate.sh ${{ github.event.inputs.treble_variant }}
        
    - name: 8. Build GSI
      run: |
        set -e
        cd /mnt/work/lineageos
        source build/envsetup.sh
        lunch lineage_${{ github.event.inputs.treble_variant }}-userdebug
        make systemimage -j$(nproc --all)
        
    - name: 9. Upload GSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-${{ github.event.inputs.lineage_branch }}-${{ github.event.inputs.treble_variant }}-GSI
        path: |
          /mnt/work/lineageos/out/target/product/*/system.img
          /mnt/work/lineageos/out/target/product/*/system.img.xz
        retention-days: 5
