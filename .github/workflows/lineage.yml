name: Build LineageOS GSI V4.6 #Mr.elang🦅🎩 FINAL

on:
  workflow_dispatch:
    inputs:
      lineage_branch:
        description: 'LineageOS Branch'
        required: true
        default: 'lineage-19.1'
        type: choice
        options:
        - lineage-19.1
        - lineage-20.0
        - lineage-21.0
      treble_variant:
        description: 'Treble Variant'
        required: true
        default: 'arm64_bgN'
        type: choice
        options:
        - arm64_bgN
        - arm64_bvN
        - a64_bgN
        - a64_bvN

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360
    
    steps:
    - name: 1. Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '/mnt/work'
        overprovision-lvm: 'true'
        
    - name: 2. Check Out Repo
      uses: actions/checkout@v4
        
    - name: 3. Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        
    - name: 4. Set Git Configs
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git config --global color.ui false
        
    - name: 5. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libdw-dev libelf-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: 6. Initialize Repo & Sync - V4.6 FINAL
      run: |
        set -e
        mkdir -p /mnt/work/lineageos
        cd /mnt/work/lineageos
        echo "=== REPO INIT ==="
        repo init -u https://github.com/LineageOS/android.git -b ${{ github.event.inputs.lineage_branch }} --git-lfs --depth=1 --no-repo-verify
        mkdir -p .repo/local_manifests
        
        echo "=== DOWNLOAD MANIFEST V4.6 ==="
        MANIFEST_OK=false
        for URL in \
          "https://raw.githubusercontent.com/phhusson/treble_experimentations/master/lineage.xml" \
          "https://raw.githubusercontent.com/ponces/treble_build_lineage/master/lineage-19.1.xml" \
          "https://gitlab.com/sdm660-mainline/treble_manifest/-/raw/master/lineage.xml"
        do
          echo "Trying $URL"
          if curl -L -f -s --retry 5 --retry-delay 3 "$URL" -o .repo/local_manifests/treble.xml; then
            echo "Manifest OK dari $URL"
            MANIFEST_OK=true
            break
          fi
        done
        
        if [ "$MANIFEST_OK" = false ]; then
          echo "Fallback: Create manifest manual V4.6"
          cat > .repo/local_manifests/treble.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="github" fetch="https://github.com" />
            <project name="phhusson/treble_experimentations" path="device/phh/treble" remote="github" revision="master" />
            <project name="phhusson/vendor_hardware_overlay" path="vendor/hardware_overlay" remote="github" revision="master" />
            <project name="TrebleDroid/vendor_interfaces" path="vendor/interfaces" remote="github" revision="android-12.1" />
          </manifest>
          EOF
        fi
        
        if [ ! -s .repo/local_manifests/treble.xml ]; then 
          echo "FATAL: Manifest kosong"; exit 1
        fi
        echo "Manifest size: $(wc -c < .repo/local_manifests/treble.xml) bytes"
        echo "Manifest head:" && head -5 .repo/local_manifests/treble.xml
        
        echo "=== CREATE DUMMY PATCHES ==="
        echo '#!/bin/bash' > patches.sh
        echo 'echo "No patches needed for ${{ github.event.inputs.lineage_branch }}"' >> patches.sh
        chmod +x patches.sh
        
        echo "=== REPO SYNC WITH RETRY ==="
        for i in 1 2 3; do
          echo "Repo sync attempt $i"
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune && break
          echo "Repo sync attempt $i failed, retry..."
          sleep 15
        done
        
    - name: 7. Apply Patches & Generate
      run: |
        set -e
        cd /mnt/work/lineageos
        bash patches.sh ${{ github.event.inputs.lineage_branch }}
        cd device/phh/treble
        bash generate.sh ${{ github.event.inputs.treble_variant }}
        
    - name: 8. Build GSI
      run: |
        set -e
        cd /mnt/work/lineageos
        source build/envsetup.sh
        lunch lineage_${{ github.event.inputs.treble_variant }}-userdebug
        make systemimage -j$(nproc --all)
        
    - name: 9. Upload GSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-${{ github.event.inputs.lineage_branch }}-${{ github.event.inputs.treble_variant }}-GSI
        path: |
          /mnt/work/lineageos/out/target/product/*/system.img
          /mnt/work/lineageos/out/target/product/*/system.img.xz
        retention-days: 5
